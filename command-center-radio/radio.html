<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Command Center Radio</title>
<style>
  :root { color-scheme: dark; }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cc-bg:        #05070a;
    --cc-bg-2:      #0a1015;
    --cc-panel:     #0f1820;
    --cc-line:      #1a2832;
    --cc-line-hi:   #2a3f4f;
    --cc-amber:     #ffb000;
    --cc-amber-dim: #6b4500;
    --cc-cyan:      #5ad3ff;
    --cc-green:     #34ff7a;
    --cc-red:       #ff4747;
    --cc-text:      #d4dde4;
    --cc-text-dim:  #5e6e7a;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--cc-bg);
    color: var(--cc-text);
    font-family: "JetBrains Mono", "Fira Code", "IBM Plex Mono",
                 ui-monospace, Menlo, Consolas, monospace;
    -webkit-font-smoothing: antialiased;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .cc {
    position: fixed; inset: 0;
    display: grid;
    grid-template-rows: auto minmax(0, 1fr) auto;
    gap: 10px;
    padding: 12px 16px;
    background:
      radial-gradient(ellipse at 50% -30%, rgba(255,176,0,0.07), transparent 55%),
      radial-gradient(ellipse at 50% 130%, rgba(90,211,255,0.04), transparent 55%),
      linear-gradient(180deg, #060a0e 0%, #04070a 100%);
  }
  .cc::before {
    content: "";
    position: absolute; inset: 0;
    pointer-events: none;
    background-image: repeating-linear-gradient(to bottom, rgba(255,255,255,0.022) 0px, rgba(255,255,255,0.022) 1px, transparent 1px, transparent 3px);
    mix-blend-mode: overlay;
    opacity: 0.55;
    z-index: 1;
  }
  .cc::after {
    content: "";
    position: absolute; inset: 0;
    pointer-events: none;
    box-shadow: inset 0 0 60px rgba(0,0,0,0.7), inset 0 0 6px rgba(255,176,0,0.05);
    z-index: 2;
  }

  /* ============ Header ============ */
  .cc-head {
    position: relative; z-index: 3;
    display: flex; align-items: center; justify-content: space-between;
    gap: 14px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--cc-line);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-size: 10px;
    min-height: 22px;
  }
  .cc-brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .cc-brand-bar { width: 4px; height: 12px; background: var(--cc-amber); box-shadow: 0 0 10px rgba(255,176,0,0.7); flex: 0 0 auto; }
  .cc-brand-title { color: var(--cc-amber); font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cc-brand-id { color: var(--cc-text-dim); flex: 0 0 auto; }

  .cc-meta { display: flex; align-items: center; gap: 14px; color: var(--cc-text-dim); flex: 0 0 auto; }
  .cc-meta b { color: var(--cc-text); font-weight: 600; }
  .cc-status { display: inline-flex; align-items: center; gap: 6px; }
  .cc-led {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--cc-amber-dim); box-shadow: 0 0 8px currentColor; color: var(--cc-amber-dim);
    flex: 0 0 auto;
  }
  .cc-led.live  { background: var(--cc-green); color: var(--cc-green); animation: cc-pulse 1.6s ease-in-out infinite; }
  .cc-led.error { background: var(--cc-red);   color: var(--cc-red);   animation: cc-blink 0.45s steps(2,end) infinite; }
  @keyframes cc-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  @keyframes cc-blink { 0% { opacity: 1; } 100% { opacity: 0.15; } }

  /* ============ Display ============ */
  .cc-screen {
    position: relative; z-index: 3;
    background: linear-gradient(180deg, rgba(255,176,0,0.05), transparent 60%), var(--cc-bg-2);
    border: 1px solid var(--cc-line);
    padding: 12px 16px;
    display: grid;
    grid-template-rows: auto 1fr;
    gap: 4px;
    overflow: hidden;
    min-height: 0;
  }
  .cc-screen::before {
    content: "";
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 25% 0%, rgba(255,176,0,0.10), transparent 65%);
    pointer-events: none;
  }
  .cc-screen-label {
    color: var(--cc-text-dim);
    font-size: 9px; letter-spacing: 0.25em;
    text-transform: uppercase;
  }
  .cc-channel {
    color: var(--cc-amber);
    font-size: clamp(20px, 5vw, 40px);
    font-weight: 700;
    letter-spacing: 0.06em;
    text-shadow: 0 0 10px rgba(255,176,0,0.45);
    line-height: 1.05;
    align-self: end;
    text-overflow: ellipsis; overflow: hidden; white-space: nowrap;
  }
  .cc-meta-row {
    display: flex; align-items: center; gap: 14px;
    font-size: 10px; letter-spacing: 0.18em;
    color: var(--cc-text-dim);
    text-transform: uppercase;
    margin-top: 4px;
    min-width: 0;
  }
  .cc-meta-row .cc-sub { color: var(--cc-text); }
  .cc-meta-row .cc-carrier {
    color: var(--cc-cyan);
    opacity: 0.75;
    letter-spacing: 0.05em;
    text-transform: none;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    min-width: 0; flex: 1;
  }

  /* ============ Controls ============ */
  .cc-controls {
    position: relative; z-index: 3;
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto auto auto auto auto;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    background: var(--cc-panel);
    border: 1px solid var(--cc-line);
  }

  /* ============ Custom dropdown with tabs ============ */
  .cc-dd { position: relative; min-width: 0; }
  .cc-dd-trigger {
    appearance: none; width: 100%;
    background: linear-gradient(180deg, #0e1a23, #0a131a);
    color: var(--cc-amber);
    border: 1px solid var(--cc-line-hi);
    padding: 9px 32px 9px 12px;
    font-family: inherit; font-size: 12px;
    letter-spacing: 0.08em; text-transform: uppercase;
    cursor: pointer; outline: none;
    text-align: left;
    display: flex; align-items: center; gap: 10px;
    min-width: 0; position: relative;
    transition: border-color 120ms ease, box-shadow 120ms ease;
  }
  .cc-dd-trigger:hover { border-color: var(--cc-amber-dim); }
  .cc-dd-trigger:focus { border-color: var(--cc-amber); box-shadow: 0 0 0 1px rgba(255,176,0,0.35), 0 0 10px rgba(255,176,0,0.15); }
  .cc-dd-label { color: var(--cc-text-dim); font-size: 9px; letter-spacing: 0.25em; flex: 0 0 auto; }
  .cc-dd-value { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cc-dd-chev {
    position: absolute; right: 10px; top: 50%;
    transform: translateY(-50%);
    color: var(--cc-amber);
    font-size: 9px; opacity: 0.7;
    pointer-events: none;
    transition: transform 150ms ease;
  }
  .cc-dd.open .cc-dd-chev { transform: translateY(-50%) rotate(180deg); }

  .cc-dd-menu {
    position: fixed; inset: 0;
    z-index: 100;
    background: rgba(5, 7, 10, 0.97);
    backdrop-filter: blur(4px);
    border: 1px solid var(--cc-amber);
    box-shadow: 0 0 40px rgba(0,0,0,0.6), inset 0 0 20px rgba(255,176,0,0.08);
    display: flex; flex-direction: column;
    animation: cc-dd-in 140ms ease-out;
  }
  .cc-dd-menu[hidden] { display: none; }
  @keyframes cc-dd-in {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .cc-dd-menu-head {
    display: flex; align-items: center; gap: 4px;
    padding: 6px 10px;
    border-bottom: 1px solid var(--cc-line);
    background: linear-gradient(180deg, rgba(255,176,0,0.06), transparent);
    flex: 0 0 auto;
  }
  .cc-dd-tabs { display: flex; gap: 2px; flex: 1; min-width: 0; }
  .cc-dd-tab {
    appearance: none;
    background: transparent;
    color: var(--cc-text-dim);
    border: 1px solid transparent;
    border-bottom: 0;
    padding: 8px 14px;
    font-family: inherit;
    font-size: 10px; letter-spacing: 0.22em;
    text-transform: uppercase;
    cursor: pointer;
    transition: color 120ms ease, background 120ms ease, border-color 120ms ease;
  }
  .cc-dd-tab:hover { color: var(--cc-text); }
  .cc-dd-tab.active {
    color: var(--cc-amber);
    background: linear-gradient(180deg, rgba(255,176,0,0.10), transparent);
    border-color: var(--cc-amber-dim);
    border-bottom-color: transparent;
  }
  .cc-dd-close {
    background: none; border: 0;
    color: var(--cc-text-dim);
    font-size: 20px; line-height: 1;
    cursor: pointer;
    padding: 4px 10px;
    transition: color 120ms ease;
    flex: 0 0 auto;
  }
  .cc-dd-close:hover { color: var(--cc-amber); }

  .cc-dd-toolbar {
    display: flex; gap: 8px;
    padding: 8px 10px;
    border-bottom: 1px solid var(--cc-line);
    background: rgba(255,176,0,0.02);
    flex: 0 0 auto;
  }
  .cc-dd-toolbar[hidden] { display: none; }
  .cc-search {
    flex: 1; min-width: 0;
    background: linear-gradient(180deg, #0e1a23, #0a131a);
    color: var(--cc-text);
    border: 1px solid var(--cc-line-hi);
    padding: 8px 12px;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 0.08em;
    outline: none;
    transition: border-color 120ms ease, box-shadow 120ms ease;
  }
  .cc-search:focus { border-color: var(--cc-amber); box-shadow: 0 0 0 1px rgba(255,176,0,0.35), 0 0 8px rgba(255,176,0,0.15); }
  .cc-search::placeholder { color: var(--cc-text-dim); letter-spacing: 0.18em; }
  .cc-shuffle {
    appearance: none;
    background: linear-gradient(180deg, #0e1a23, #0a131a);
    color: var(--cc-text-dim);
    border: 1px solid var(--cc-line-hi);
    padding: 0 12px;
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 0.22em;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
    transition: color 120ms ease, border-color 120ms ease, box-shadow 120ms ease, background 120ms ease;
    flex: 0 0 auto;
  }
  .cc-shuffle:hover { color: var(--cc-text); border-color: var(--cc-amber-dim); }
  .cc-shuffle.active {
    color: var(--cc-amber);
    border-color: var(--cc-amber);
    background: linear-gradient(180deg, rgba(255,176,0,0.12), rgba(255,176,0,0.02));
    box-shadow: 0 0 10px rgba(255,176,0,0.20);
  }
  .cc-shuffle-icon { font-size: 14px; }

  .cc-dd-empty {
    padding: 24px 14px;
    text-align: center;
    color: var(--cc-text-dim);
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
  }
  .cc-dd-empty[hidden] { display: none; }

  /* ADD-item bar (replaces toolbar when adding) */
  .cc-dd-addbar {
    display: flex; gap: 8px;
    padding: 8px 10px;
    border-bottom: 1px solid var(--cc-amber-dim);
    background: linear-gradient(180deg, rgba(255,176,0,0.05), transparent);
    flex: 0 0 auto;
  }
  .cc-dd-addbar[hidden] { display: none; }
  .cc-dd-addmsg {
    padding: 6px 14px;
    font-size: 10px; letter-spacing: 0.18em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--cc-line);
    flex: 0 0 auto;
  }
  .cc-dd-addmsg[hidden] { display: none; }
  .cc-dd-addmsg.ok    { color: var(--cc-green); }
  .cc-dd-addmsg.err   { color: var(--cc-red); }
  .cc-dd-addmsg.info  { color: var(--cc-cyan); }

  /* User-added item styling: small star + delete button */
  .cc-dd-item.user .cc-dd-num::before { content: "\2605 "; color: var(--cc-amber); }
  .cc-dd-item-del {
    appearance: none;
    background: none; border: 0;
    color: var(--cc-text-dim);
    font-size: 14px; line-height: 1;
    cursor: pointer;
    padding: 0 6px;
    align-self: center;
    opacity: 0;
    transition: opacity 120ms ease, color 120ms ease;
  }
  .cc-dd-item:hover .cc-dd-item-del { opacity: 1; }
  .cc-dd-item-del:hover { color: var(--cc-red); }
  .cc-dd-item.user { grid-template-columns: auto 1fr auto; }

  .cc-dd-list { list-style: none; overflow-y: auto; flex: 1; }
  .cc-dd-list[hidden] { display: none; }
  .cc-dd-item {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 12px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--cc-line);
    cursor: pointer;
    transition: background 120ms ease, border-color 120ms ease;
  }
  .cc-dd-item:hover { background: rgba(255,176,0,0.06); }
  .cc-dd-item.selected {
    background: linear-gradient(180deg, rgba(255,176,0,0.12), rgba(255,176,0,0.03));
    border-left: 2px solid var(--cc-amber);
    padding-left: 12px;
  }
  .cc-dd-num {
    color: var(--cc-text-dim);
    font-size: 10px; letter-spacing: 0.2em;
    align-self: center;
  }
  .cc-dd-item.selected .cc-dd-num { color: var(--cc-amber); }
  .cc-dd-name {
    color: var(--cc-text);
    font-size: 13px; font-weight: 700;
    letter-spacing: 0.06em;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .cc-dd-item.selected .cc-dd-name { color: var(--cc-amber); text-shadow: 0 0 6px rgba(255,176,0,0.35); }
  .cc-dd-sub {
    color: var(--cc-text-dim);
    font-size: 10px; letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-top: 2px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* ============ Buttons & volume ============ */
  .cc-btn {
    appearance: none;
    background: linear-gradient(180deg, #131e27, #0c141a);
    color: var(--cc-text);
    border: 1px solid var(--cc-line-hi);
    padding: 0;
    font-family: inherit; font-size: 12px;
    letter-spacing: 0.15em;
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    touch-action: manipulation;
    transition: border-color 120ms ease, transform 80ms ease, box-shadow 120ms ease;
  }
  .cc-btn:hover  { border-color: var(--cc-amber-dim); }
  .cc-btn:active { transform: translateY(1px); }

  .cc-play {
    width: 44px; height: 44px;
    border-radius: 50%;
    border-color: var(--cc-amber);
    color: var(--cc-amber);
    background:
      radial-gradient(circle at 40% 30%, rgba(255,176,0,0.18), transparent 60%),
      linear-gradient(180deg, #1a2530, #0a131a);
    box-shadow:
      inset 0 0 10px rgba(255,176,0,0.20),
      0 0 14px rgba(255,176,0,0.20),
      0 0 0 1px rgba(255,176,0,0.30);
    font-size: 15px;
  }
  .cc-play:hover { box-shadow: inset 0 0 12px rgba(255,176,0,0.28), 0 0 18px rgba(255,176,0,0.30), 0 0 0 1px rgba(255,176,0,0.55); }

  .cc-stop {
    width: 36px; height: 36px;
    font-size: 11px;
    color: var(--cc-text-dim);
  }

  .cc-skip {
    width: 36px; height: 36px;
    font-size: 13px;
    color: var(--cc-text-dim);
  }
  .cc-skip:hover { color: var(--cc-amber); }

  .cc-vol {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 0 10px;
    border: 1px solid var(--cc-line-hi);
    background: linear-gradient(180deg, #0e1a23, #0a131a);
    height: 36px;
    min-width: 0;
  }
  .cc-vol-label { color: var(--cc-text-dim); font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase; }
  .cc-vol input[type="range"] {
    -webkit-appearance: none; appearance: none;
    width: 80px; height: 3px;
    background: var(--cc-line-hi);
    outline: none;
  }
  .cc-vol input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 12px; height: 12px;
    background: var(--cc-amber);
    border: 1px solid #000;
    box-shadow: 0 0 5px rgba(255,176,0,0.7);
    cursor: pointer;
  }
  .cc-vol input[type="range"]::-moz-range-thumb {
    width: 12px; height: 12px;
    background: var(--cc-amber);
    border: 1px solid #000;
    box-shadow: 0 0 5px rgba(255,176,0,0.7);
    cursor: pointer;
  }
  .cc-vol-readout { font-size: 10px; letter-spacing: 0.1em; color: var(--cc-text-dim); min-width: 22px; text-align: right; }

  /* ============ Responsive ============ */
  @media (max-width: 620px) {
    .cc-controls {
      grid-template-columns: auto auto auto auto 1fr;
      grid-template-areas:
        "select select select select select"
        "prev   play   next   stop   vol";
      gap: 8px;
    }
    .cc-dd   { grid-area: select; min-width: 0; }
    #cc-prev { grid-area: prev; }
    .cc-play { grid-area: play; }
    #cc-next { grid-area: next; }
    .cc-stop { grid-area: stop; }
    .cc-vol  { grid-area: vol; justify-self: stretch; min-width: 0; }
    .cc-vol input[type="range"] { width: 100%; flex: 1; }
  }
  @media (max-width: 440px) {
    .cc-brand-id, .cc-meta .cc-sig, .cc-meta .cc-time-wrap { display: none; }
    .cc-channel { font-size: clamp(16px, 5.5vw, 26px); }
  }
  @media (max-height: 200px) {
    .cc-meta-row .cc-carrier { display: none; }
  }
</style>
</head>
<body>

<div class="cc">

  <header class="cc-head">
    <div class="cc-brand">
      <span class="cc-brand-bar"></span>
      <span class="cc-brand-title">COMMAND CENTER // AUDIO</span>
      <span class="cc-brand-id">CCR-01</span>
    </div>
    <div class="cc-meta">
      <span class="cc-sig">SRC <b id="cc-source">RADIO</b></span>
      <span class="cc-time-wrap">TIME <b id="cc-clock">--:--:--</b></span>
      <span class="cc-status">
        <span id="cc-led" class="cc-led"></span>
        <span id="cc-status-text">STANDBY</span>
      </span>
    </div>
  </header>

  <section class="cc-screen">
    <span id="cc-screen-label" class="cc-screen-label">CHANNEL</span>
    <div>
      <div id="cc-channel" class="cc-channel">--- NO SIGNAL ---</div>
      <div class="cc-meta-row">
        <span id="cc-sub" class="cc-sub">awaiting selection</span>
        <span id="cc-carrier" class="cc-carrier"></span>
      </div>
    </div>
  </section>

  <footer class="cc-controls">
    <div class="cc-dd" id="cc-dd">
      <button type="button" class="cc-dd-trigger" id="cc-dd-trigger" aria-haspopup="listbox" aria-expanded="false">
        <span class="cc-dd-label">SOURCE</span>
        <span class="cc-dd-value" id="cc-dd-value">SELECT TRANSMISSION</span>
        <span class="cc-dd-chev">&#9662;</span>
      </button>
      <div class="cc-dd-menu" id="cc-dd-menu" hidden>
        <div class="cc-dd-menu-head">
          <div class="cc-dd-tabs">
            <button type="button" class="cc-dd-tab active" data-tab="stations">STATIONS</button>
            <button type="button" class="cc-dd-tab" data-tab="library">LIBRARY</button>
          </div>
          <button type="button" id="cc-dd-close" class="cc-dd-close" aria-label="Close">&times;</button>
        </div>
        <div class="cc-dd-toolbar" id="cc-dd-toolbar" hidden>
          <input type="text" id="cc-search" class="cc-search" placeholder="SEARCH LIBRARY..." aria-label="Search library" autocomplete="off">
          <button type="button" id="cc-shuffle" class="cc-shuffle" title="Shuffle library">
            <span class="cc-shuffle-icon">&#8646;</span>
            <span>SHUFFLE</span>
          </button>
          <button type="button" id="cc-add-open" class="cc-shuffle" title="Add a track from archive.org">
            <span class="cc-shuffle-icon">&#43;</span>
            <span>ADD</span>
          </button>
        </div>
        <div class="cc-dd-addbar" id="cc-dd-addbar" hidden>
          <input type="text" id="cc-add-url" class="cc-search" placeholder="PASTE ARCHIVE.ORG URL OR ITEM ID..." aria-label="Add item URL" autocomplete="off">
          <button type="button" id="cc-add-save" class="cc-shuffle" title="Save to library">
            <span class="cc-shuffle-icon">&#10003;</span>
            <span>SAVE</span>
          </button>
          <button type="button" id="cc-add-cancel" class="cc-shuffle" title="Cancel">
            <span class="cc-shuffle-icon">&times;</span>
            <span>CANCEL</span>
          </button>
        </div>
        <div class="cc-dd-addmsg" id="cc-dd-addmsg" hidden></div>
        <ul class="cc-dd-list" id="cc-dd-list-stations"></ul>
        <ul class="cc-dd-list" id="cc-dd-list-library" hidden></ul>
        <div class="cc-dd-empty" id="cc-dd-empty" hidden>NO MATCHES</div>
      </div>
    </div>

    <button type="button" id="cc-prev" class="cc-btn cc-skip" aria-label="Previous">&#9198;</button>
    <button type="button" id="cc-play" class="cc-btn cc-play" aria-label="Play / pause">
      <span id="cc-play-icon">&#9658;</span>
    </button>
    <button type="button" id="cc-next" class="cc-btn cc-skip" aria-label="Next">&#9197;</button>
    <button type="button" id="cc-stop" class="cc-btn cc-stop" aria-label="Stop">&#9632;</button>

    <div class="cc-vol">
      <span class="cc-vol-label">VOL</span>
      <input type="range" id="cc-volume" min="0" max="1" step="0.01" value="0.8">
      <span id="cc-vol-read" class="cc-vol-readout">80</span>
    </div>
  </footer>

</div>

<audio id="cc-audio" preload="none"></audio>

<script>
(function(){
  // === Live radio stations (SomaFM) ============================================
  const STATIONS = [

  // Each entry: { name, sub, identifier, user: true }

    try { return JSON.parse(localStorage.getItem(USER_LIB_KEY) || "[]"); }

    try { localStorage.setItem(USER_LIB_KEY, JSON.stringify(items)); } catch (e) {}

  // Populate both lists
  function escapeHTML(s) {
    return String(s).replace(/[&<>"']/g, c =>
      ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
  }

  function populate(listEl, items, kind) {
    listEl.innerHTML = "";
    items.forEach((s, i) => {
      const li = document.createElement("li");
      li.className = "cc-dd-item" + (s.user ? " user" : "");
      li.dataset.idx = String(i);
      li.dataset.kind = kind;
      const num = kind === "library" ? "TR " + String(i+1).padStart(2,"0")
                                     : "CH " + String(i+1).padStart(2,"0");
      let html =
        '<span class="cc-dd-num">' + num + '</span>' +
        '<span><span class="cc-dd-name">' + escapeHTML(s.name) + '</span>' +
        '<div class="cc-dd-sub">' + escapeHTML(s.sub) + '</div></span>';
      if (s.user) html += '<button type="button" class="cc-dd-item-del" title="Remove from library" aria-label="Remove">&times;</button>';

      li.addEventListener("click", ev => {
        if (ev.target.closest(".cc-dd-item-del")) return; // handled separately
        selectItem(kind, i);
        closeDropdown();
      });
      const delBtn = li.querySelector(".cc-dd-item-del");
      if (delBtn) {
        delBtn.addEventListener("click", ev => {
          ev.stopPropagation();
          removeUserItem(i);
        });
      }
      listEl.appendChild(li);
    });

  const state = { kind: null, idx: -1, current: null, shuffle: false };

  // Tab switching - also show/hide library toolbar
  function setActiveTab(name) {
    tabs.forEach(t => t.classList.toggle("active", t.dataset.tab === name));
    ddListS.hidden = name !== "stations";
    ddListL.hidden = name !== "library";

  // Search filter
  function applyFilter() {
    const q = (searchIn.value || "").trim().toLowerCase();
    let visible = 0;
    Array.from(ddListL.children).forEach((li, i) => {
      const item = LIBRARY[i];
      const matches = !q ||
        item.name.toLowerCase().includes(q) ||
        item.sub.toLowerCase().includes(q);
      li.style.display = matches ? "" : "none";
      if (matches) visible++;
    });
    emptyMsg.hidden = visible > 0 || ddListL.hidden;
  }
  searchIn.addEventListener("input", applyFilter);

  // Shuffle: toggles a mode (auto-advance becomes random) AND immediately plays a random track
  function pickRandomLibraryIdx(exclude) {
    if (LIBRARY.length <= 1) return 0;
    let n;
    do { n = Math.floor(Math.random() * LIBRARY.length); } while (n === exclude);
    return n;
  }
  shuffleBtn.addEventListener("click", () => {
    state.shuffle = !state.shuffle;
    shuffleBtn.classList.toggle("active", state.shuffle);

      selectItem("library", pickRandomLibraryIdx(state.kind === "library" ? state.idx : -1));
      closeDropdown();
    }
  });

  function openDropdown() {
    // Open on the tab matching whatever's currently playing, falling back to stations.
    setActiveTab(state.kind === "library" ? "library" : "stations");
    ddMenu.hidden = false;
    dd.classList.add("open");
    ddTrig.setAttribute("aria-expanded", "true");

    playIcn.innerHTML = playing ? "&#10074;&#10074;" : "&#9658;";

  // Resolve a library item's actual playable MP3 URL via archive.org's API.
  // 1) advancedsearch -> find an item identifier matching the query
  // 2) metadata -> list files in that item
  // 3) pick the smallest plausible MP3 (preferring VBR derivative)
  // Returns { url, identifier } or throws.
  async function pickMp3FromIdentifier(identifier) {
    const mRes = await fetch("https://archive.org/metadata/" + encodeURIComponent(identifier));
    if (!mRes.ok) throw new Error("meta " + mRes.status);
    const mJson = await mRes.json();
    const files = (mJson && mJson.files) || [];
    if (!files.length) throw new Error("no files");
    const mp3s = files.filter(f => f.name && f.name.toLowerCase().endsWith(".mp3"));
    if (!mp3s.length) throw new Error("no mp3");
    const pick =
      mp3s.find(f => /vbr/i.test(f.name)) ||
      mp3s.find(f => /64kb/i.test(f.name)) ||
      mp3s.find(f => (f.source || "").toLowerCase() === "derivative") ||
      mp3s[0];
    return {
      url: "https://archive.org/download/" + encodeURIComponent(identifier) + "/" + encodeURIComponent(pick.name),
      identifier,
      meta: mJson.metadata || {}
    };
  }

  // Resolve a library item's playable MP3 URL. Cache lives on the item object
  // itself (not indexed by position), so reordering after add/delete is safe.
  async function resolveLibraryURL(idx) {
    const item = LIBRARY[idx];
    if (item._resolved) return item._resolved;

    // User-added items already store the identifier directly - skip search.
    if (item.identifier) {
      item._resolved = await pickMp3FromIdentifier(item.identifier);
      return item._resolved;
    }

    // Curated items: search archive.org for a matching identifier.
    const searchUrl =
      "https://archive.org/advancedsearch.php?q=" + encodeURIComponent(item.q) +
      "&fl%5B%5D=identifier&fl%5B%5D=title&rows=1&page=1&output=json";
    const sRes = await fetch(searchUrl);
    if (!sRes.ok) throw new Error("search " + sRes.status);
    const sJson = await sRes.json();
    const docs = sJson && sJson.response && sJson.response.docs;
    if (!docs || !docs.length) throw new Error("no match");
    item._resolved = await pickMp3FromIdentifier(docs[0].identifier);
    return item._resolved;
  }

  async function selectItem(kind, idx) {
    const items = kind === "library" ? LIBRARY : STATIONS;
    const s = items[idx];
    if (!s) return;
    state.kind = kind; state.idx = idx; state.current = s;
    channel.textContent = s.name;
    sub.textContent     = s.sub;
    sourceL.textContent = kind === "library" ? "ARCHIVE" : "RADIO";
    screenLb.textContent = kind === "library" ? "NOW PLAYING" : "CHANNEL";
    ddVal.textContent = s.name;

    // Reflect selection visually
    [ddListS, ddListL].forEach(list => {
      Array.from(list.children).forEach((li, i) => {
        li.classList.toggle("selected", list === (kind === "library" ? ddListL : ddListS) && i === idx);
      });
    });

    let url;
    if (kind === "library") {
      setStatus("SEARCHING ARCHIVE...", "");
      carrier.textContent = "· resolving " + s.q.slice(0, 60) + "...";
      try {
        const r = await resolveLibraryURL(idx);
        // Guard: user may have clicked something else while we were resolving.
        if (state.kind !== "library" || state.idx !== idx) return;
        url = r.url;
        carrier.textContent = "· archive.org/" + r.identifier;
      } catch (err) {
        setStatus("NOT FOUND ON ARCHIVE", "error");
        carrier.textContent = "· " + (err.message || "lookup failed");
        return;
      }
    } else {
      url = s.url;
      carrier.textContent = "· " + url.replace(/^https?:\/\//, "");
    }

    audio.src = url;
    audio.load();
    setStatus("ACQUIRING...", "");
    audio.play().catch(() => setStatus("FAULT", "error"));
  }

  playBtn.addEventListener("click", () => {
    if (!state.current) {
      selectItem("stations", 0);
      return;
    }
    if (audio.paused) audio.play().catch(() => setStatus("FAULT", "error"));
    else audio.pause();
  });

  stopBtn.addEventListener("click", () => {
    audio.pause();
    audio.removeAttribute("src");
    audio.load();
    state.kind = null; state.idx = -1; state.current = null;
    channel.textContent = "--- NO SIGNAL ---";
    sub.textContent = "awaiting selection";
    carrier.textContent = "";
    sourceL.textContent = "RADIO";
    screenLb.textContent = "CHANNEL";
    ddVal.textContent = "SELECT TRANSMISSION";
    [ddListS, ddListL].forEach(list => Array.from(list.children).forEach(li => li.classList.remove("selected")));
    setStatus("STANDBY", "");
    setPlayIcon(false);
  });

  // ===== Skip (prev / next) =====
  const prevBtn = $("cc-prev");
  const nextBtn = $("cc-next");
  function skipBy(direction) {
    if (!state.current) { selectItem("stations", 0); return; }
    if (state.kind === "library" && state.shuffle) {
      selectItem("library", pickRandomLibraryIdx(state.idx));
      return;
    }
    const list = state.kind === "library" ? LIBRARY : STATIONS;
    const len = list.length;
    if (!len) return;
    const next = (state.idx + direction + len) % len;
    selectItem(state.kind, next);
  }
  prevBtn.addEventListener("click", () => skipBy(-1));
  nextBtn.addEventListener("click", () => skipBy(+1));

  // ===== User-added library items =====
  const addOpenBtn   = $("cc-add-open");
  const addSaveBtn   = $("cc-add-save");
  const addCancelBtn = $("cc-add-cancel");
  const addUrlInput  = $("cc-add-url");

  function showAddBar(show) {
    addbar.hidden = !show;

  function setAddMsg(text, level) {
    if (!text) { addmsg.hidden = true; addmsg.className = "cc-dd-addmsg"; return; }
    addmsg.hidden = false;
    addmsg.className = "cc-dd-addmsg " + (level || "info");

  function currentTab() {
    const t = document.querySelector(".cc-dd-tab.active");
    return t ? t.dataset.tab : "stations";

  // Accept a full archive.org URL or just an identifier. Returns the identifier.
  function parseIdentifier(input) {
    const trimmed = (input || "").trim();
    if (!trimmed) return null;
    const m = trimmed.match(/archive\.org\/(?:details|download|metadata|embed)\/([^/?#]+)/i);
    if (m) return decodeURIComponent(m[1]);
    // Bare identifier - simple validation (no whitespace, no slashes)
    if (/^[A-Za-z0-9._-]+$/.test(trimmed)) return trimmed;
    return null;
  }

  async function addUserItem(input) {
    const identifier = parseIdentifier(input);
    if (!identifier) { setAddMsg("Not a valid archive.org URL or ID", "err"); return; }
    setAddMsg("Fetching metadata...", "info");
    try {
      const r = await fetch("https://archive.org/metadata/" + encodeURIComponent(identifier));
      if (!r.ok) throw new Error("item not found (" + r.status + ")");
      const meta = await r.json();
      const md = (meta && meta.metadata) || {};
      // Reject items with no audio files - bail before saving
      const audioFiles = (meta.files || []).filter(f => f.name && f.name.toLowerCase().endsWith(".mp3"));
      if (!audioFiles.length) throw new Error("no playable mp3 in this item");

      const title  = String(md.title || identifier).toUpperCase().slice(0, 80);
      const creator = Array.isArray(md.creator) ? md.creator.join(", ") : (md.creator || "ARCHIVE.ORG");
      const year   = md.year || md.date || "";
      const sub    = String(creator + (year ? " · " + String(year).slice(0,4) : "")).toUpperCase().slice(0, 80);

      const item = { name: title, sub: sub, identifier, user: true };

      // Prevent duplicates
      const user = loadUserLibrary();
      if (user.some(u => u.identifier === identifier)) {
        setAddMsg("Already in your library", "err");
        return;
      }
      user.unshift(item);
      saveUserLibrary(user);

      // Splice into the live LIBRARY array (at the top) and rebuild the list
      LIBRARY.unshift(item);
      populate(ddListL, LIBRARY, "library");
      applyFilter();

      setAddMsg("Added: " + title, "ok");
      addUrlInput.value = "";
      // Auto-hide message after a moment
      setTimeout(() => setAddMsg("", null), 2500);
    } catch (err) {
      setAddMsg("Error: " + (err.message || "unknown"), "err");
    }
  }

  function removeUserItem(idxInLibrary) {
    const item = LIBRARY[idxInLibrary];
    if (!item || !item.user) return;
    // Pull from persisted store
    const user = loadUserLibrary().filter(u => u.identifier !== item.identifier);
    saveUserLibrary(user);
    LIBRARY.splice(idxInLibrary, 1);
    // If the removed item was currently playing, reset state.idx so skip still works
    if (state.kind === "library") {
      if (state.idx === idxInLibrary) { state.idx = -1; state.current = null; }
      else if (state.idx > idxInLibrary) { state.idx -= 1; }
    }
    populate(ddListL, LIBRARY, "library");
    applyFilter();
  }

  addOpenBtn.addEventListener("click", () => showAddBar(true));
  addCancelBtn.addEventListener("click", () => showAddBar(false));
  addSaveBtn.addEventListener("click", () => addUserItem(addUrlInput.value));
  addUrlInput.addEventListener("keydown", e => {
    if (e.key === "Enter") { e.preventDefault(); addUserItem(addUrlInput.value); }
    else if (e.key === "Escape") { e.preventDefault(); showAddBar(false); }
  });

  function applyVol(v) { audio.volume = v; volRd.textContent = String(Math.round(v*100)); }
  volIn.addEventListener("input", e => applyVol(parseFloat(e.target.value)));
  applyVol(parseFloat(volIn.value));

  audio.addEventListener("playing", () => { setPlayIcon(true);  setStatus("TRANSMITTING", "live"); });
  audio.addEventListener("pause",   () => { setPlayIcon(false); if (state.current) setStatus("PAUSED", ""); });
  audio.addEventListener("waiting", () => setStatus("BUFFERING...", ""));
  audio.addEventListener("stalled", () => setStatus("STALLED", "error"));
  audio.addEventListener("error",   () => { setStatus("SIGNAL LOST", "error"); setPlayIcon(false); });

  // When an Archive.org track ends, auto-advance to the next library item.
  audio.addEventListener("ended", () => {
    if (state.kind === "library") {
      const next = state.shuffle
        ? pickRandomLibraryIdx(state.idx)
        : (state.idx + 1) % LIBRARY.length;
      selectItem("library", next);
    }
  });

  function tick() {
    const d = new Date();
    const hh = String(d.getHours()).padStart(2,"0");
    const mm = String(d.getMinutes()).padStart(2,"0");
    const ss = String(d.getSeconds()).padStart(2,"0");
    clock.textContent = hh + ":" + mm + ":" + ss;
  }
  tick(); setInterval(tick, 1000);
})();
</script>
</body>
</html>
