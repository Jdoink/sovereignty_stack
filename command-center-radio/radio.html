<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Command Center Radio</title>
<style>
  :root { color-scheme: dark; }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cc-bg:        #05070a;
    --cc-bg-2:      #0a1015;
    --cc-panel:     #0f1820;
    --cc-line:      #1a2832;
    --cc-line-hi:   #2a3f4f;
    --cc-amber:     #ffb000;
    --cc-amber-dim: #6b4500;
    --cc-cyan:      #5ad3ff;
    --cc-green:     #34ff7a;
    --cc-red:       #ff4747;
    --cc-text:      #d4dde4;
    --cc-text-dim:  #5e6e7a;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--cc-bg);
    color: var(--cc-text);
    font-family: "JetBrains Mono", "Fira Code", "IBM Plex Mono",
                 ui-monospace, Menlo, Consolas, monospace;
    -webkit-font-smoothing: antialiased;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .cc {
    position: fixed; inset: 0;
    display: grid;
    grid-template-rows: auto minmax(0, 1fr) auto;
    gap: 10px;
    padding: 12px 16px;
    background:
      radial-gradient(ellipse at 50% -30%, rgba(255,176,0,0.07), transparent 55%),
      radial-gradient(ellipse at 50% 130%, rgba(90,211,255,0.04), transparent 55%),
      linear-gradient(180deg, #060a0e 0%, #04070a 100%);
  }
  .cc::before {
    content: "";
    position: absolute; inset: 0;
    pointer-events: none;
    background-image: repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.022) 0px,
      rgba(255,255,255,0.022) 1px,
      transparent 1px,
      transparent 3px
    );
    mix-blend-mode: overlay;
    opacity: 0.55;
    z-index: 1;
  }
  .cc::after {
    content: "";
    position: absolute; inset: 0;
    pointer-events: none;
    box-shadow:
      inset 0 0 60px rgba(0,0,0,0.7),
      inset 0 0 6px rgba(255,176,0,0.05);
    z-index: 2;
  }

  /* ============ Header ============ */
  .cc-head {
    position: relative; z-index: 3;
    display: flex; align-items: center; justify-content: space-between;
    gap: 14px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--cc-line);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-size: 10px;
    min-height: 22px;
  }
  .cc-brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .cc-brand-bar {
    width: 4px; height: 12px;
    background: var(--cc-amber);
    box-shadow: 0 0 10px rgba(255,176,0,0.7);
    flex: 0 0 auto;
  }
  .cc-brand-title {
    color: var(--cc-amber); font-weight: 700;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .cc-brand-id { color: var(--cc-text-dim); flex: 0 0 auto; }

  .cc-meta { display: flex; align-items: center; gap: 14px; color: var(--cc-text-dim); flex: 0 0 auto; }
  .cc-meta b { color: var(--cc-text); font-weight: 600; }
  .cc-status { display: inline-flex; align-items: center; gap: 6px; }
  .cc-led {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--cc-amber-dim);
    box-shadow: 0 0 8px currentColor;
    color: var(--cc-amber-dim);
    flex: 0 0 auto;
  }
  .cc-led.live  { background: var(--cc-green); color: var(--cc-green);
                  animation: cc-pulse 1.6s ease-in-out infinite; }
  .cc-led.error { background: var(--cc-red);   color: var(--cc-red);
                  animation: cc-blink 0.45s steps(2,end) infinite; }
  @keyframes cc-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  @keyframes cc-blink { 0% { opacity: 1; } 100% { opacity: 0.15; } }

  /* ============ Display ============ */
  .cc-screen {
    position: relative; z-index: 3;
    background:
      linear-gradient(180deg, rgba(255,176,0,0.05), transparent 60%),
      var(--cc-bg-2);
    border: 1px solid var(--cc-line);
    padding: 12px 16px;
    display: grid;
    grid-template-rows: auto 1fr;
    gap: 4px;
    overflow: hidden;
    min-height: 0;
  }
  .cc-screen::before {
    content: "";
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 25% 0%, rgba(255,176,0,0.10), transparent 65%);
    pointer-events: none;
  }
  .cc-screen-label {
    color: var(--cc-text-dim);
    font-size: 9px; letter-spacing: 0.25em;
    text-transform: uppercase;
  }
  .cc-channel {
    color: var(--cc-amber);
    font-size: clamp(22px, 5.5vw, 44px);
    font-weight: 700;
    letter-spacing: 0.06em;
    text-shadow: 0 0 10px rgba(255,176,0,0.45);
    line-height: 1.05;
    align-self: end;
    text-overflow: ellipsis; overflow: hidden; white-space: nowrap;
  }
  .cc-meta-row {
    display: flex; align-items: center;
    gap: 14px;
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--cc-text-dim);
    text-transform: uppercase;
    margin-top: 4px;
    min-width: 0;
  }
  .cc-meta-row .cc-sub { color: var(--cc-text); }
  .cc-meta-row .cc-carrier {
    color: var(--cc-cyan);
    opacity: 0.75;
    letter-spacing: 0.05em;
    text-transform: none;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    min-width: 0; flex: 1;
  }

  /* ============ Controls ============ */
  .cc-controls {
    position: relative; z-index: 3;
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto auto auto;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    background: var(--cc-panel);
    border: 1px solid var(--cc-line);
  }

  /* ============ Custom dropdown (replaces <select> so options
     never get clipped by the iframe boundary) ============ */
  .cc-dd { position: relative; min-width: 0; }
  .cc-dd-trigger {
    appearance: none;
    width: 100%;
    background: linear-gradient(180deg, #0e1a23, #0a131a);
    color: var(--cc-amber);
    border: 1px solid var(--cc-line-hi);
    padding: 9px 32px 9px 12px;
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    outline: none;
    text-align: left;
    display: flex; align-items: center; gap: 10px;
    min-width: 0;
    position: relative;
    transition: border-color 120ms ease, box-shadow 120ms ease;
  }
  .cc-dd-trigger:hover { border-color: var(--cc-amber-dim); }
  .cc-dd-trigger:focus { border-color: var(--cc-amber); box-shadow: 0 0 0 1px rgba(255,176,0,0.35), 0 0 10px rgba(255,176,0,0.15); }
  .cc-dd-label {
    color: var(--cc-text-dim);
    font-size: 9px; letter-spacing: 0.25em;
    flex: 0 0 auto;
  }
  .cc-dd-value {
    flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .cc-dd-chev {
    position: absolute; right: 10px; top: 50%;
    transform: translateY(-50%);
    color: var(--cc-amber);
    font-size: 9px;
    opacity: 0.7;
    pointer-events: none;
    transition: transform 150ms ease;
  }
  .cc-dd.open .cc-dd-chev { transform: translateY(-50%) rotate(180deg); }

  /* Menu overlay: fills the entire iframe so it can never be clipped */
  .cc-dd-menu {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(5, 7, 10, 0.97);
    backdrop-filter: blur(4px);
    border: 1px solid var(--cc-amber);
    box-shadow: 0 0 40px rgba(0,0,0,0.6), inset 0 0 20px rgba(255,176,0,0.08);
    display: flex; flex-direction: column;
    animation: cc-dd-in 140ms ease-out;
  }
  .cc-dd-menu[hidden] { display: none; }
  @keyframes cc-dd-in {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .cc-dd-menu-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px;
    border-bottom: 1px solid var(--cc-line);
    background: linear-gradient(180deg, rgba(255,176,0,0.06), transparent);
    color: var(--cc-amber);
    font-size: 10px; letter-spacing: 0.25em;
    text-transform: uppercase;
    flex: 0 0 auto;
  }
  .cc-dd-close {
    background: none; border: 0;
    color: var(--cc-text-dim);
    font-size: 18px; line-height: 1;
    cursor: pointer;
    padding: 4px 8px;
    transition: color 120ms ease;
  }
  .cc-dd-close:hover { color: var(--cc-amber); }
  .cc-dd-list {
    list-style: none;
    overflow-y: auto;
    flex: 1;
  }
  .cc-dd-item {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 12px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--cc-line);
    cursor: pointer;
    transition: background 120ms ease, border-color 120ms ease;
  }
  .cc-dd-item:hover { background: rgba(255,176,0,0.06); }
  .cc-dd-item.selected {
    background: linear-gradient(180deg, rgba(255,176,0,0.12), rgba(255,176,0,0.03));
    border-left: 2px solid var(--cc-amber);
    padding-left: 12px;
  }
  .cc-dd-num {
    color: var(--cc-text-dim);
    font-size: 10px; letter-spacing: 0.2em;
    align-self: center;
  }
  .cc-dd-item.selected .cc-dd-num { color: var(--cc-amber); }
  .cc-dd-name {
    color: var(--cc-text);
    font-size: 13px; font-weight: 700;
    letter-spacing: 0.06em;
  }
  .cc-dd-item.selected .cc-dd-name { color: var(--cc-amber); text-shadow: 0 0 6px rgba(255,176,0,0.35); }
  .cc-dd-sub {
    color: var(--cc-text-dim);
    font-size: 10px; letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* ============ Buttons & volume ============ */
  .cc-btn {
    appearance: none;
    background: linear-gradient(180deg, #131e27, #0c141a);
    color: var(--cc-text);
    border: 1px solid var(--cc-line-hi);
    padding: 0;
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 0.15em;
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    touch-action: manipulation;
    transition: border-color 120ms ease, transform 80ms ease, box-shadow 120ms ease;
  }
  .cc-btn:hover  { border-color: var(--cc-amber-dim); }
  .cc-btn:active { transform: translateY(1px); }

  .cc-play {
    width: 44px; height: 44px;
    border-radius: 50%;
    border-color: var(--cc-amber);
    color: var(--cc-amber);
    background:
      radial-gradient(circle at 40% 30%, rgba(255,176,0,0.18), transparent 60%),
      linear-gradient(180deg, #1a2530, #0a131a);
    box-shadow:
      inset 0 0 10px rgba(255,176,0,0.20),
      0 0 14px rgba(255,176,0,0.20),
      0 0 0 1px rgba(255,176,0,0.30);
    font-size: 15px;
  }
  .cc-play:hover { box-shadow: inset 0 0 12px rgba(255,176,0,0.28), 0 0 18px rgba(255,176,0,0.30), 0 0 0 1px rgba(255,176,0,0.55); }

  .cc-stop {
    width: 36px; height: 36px;
    font-size: 11px;
    color: var(--cc-text-dim);
  }

  .cc-vol {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 0 10px;
    border: 1px solid var(--cc-line-hi);
    background: linear-gradient(180deg, #0e1a23, #0a131a);
    height: 36px;
    min-width: 0;
  }
  .cc-vol-label {
    color: var(--cc-text-dim);
    font-size: 9px; letter-spacing: 0.25em;
    text-transform: uppercase;
  }
  .cc-vol input[type="range"] {
    -webkit-appearance: none; appearance: none;
    width: 80px; height: 3px;
    background: var(--cc-line-hi);
    outline: none;
  }
  .cc-vol input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 12px; height: 12px;
    background: var(--cc-amber);
    border: 1px solid #000;
    box-shadow: 0 0 5px rgba(255,176,0,0.7);
    cursor: pointer;
  }
  .cc-vol input[type="range"]::-moz-range-thumb {
    width: 12px; height: 12px;
    background: var(--cc-amber);
    border: 1px solid #000;
    box-shadow: 0 0 5px rgba(255,176,0,0.7);
    cursor: pointer;
  }
  .cc-vol-readout {
    font-size: 10px; letter-spacing: 0.1em;
    color: var(--cc-text-dim);
    min-width: 22px; text-align: right;
  }

  /* ============ Responsive ============ */
  @media (max-width: 620px) {
    .cc-controls {
      grid-template-columns: 1fr auto auto;
      grid-template-areas:
        "select   play stop"
        "vol      vol  vol";
      gap: 8px;
    }
    .cc-dd          { grid-area: select; }
    .cc-play        { grid-area: play; }
    .cc-stop        { grid-area: stop; }
    .cc-vol         { grid-area: vol; justify-self: stretch; }
    .cc-vol input[type="range"] { width: 100%; flex: 1; }
  }
  @media (max-width: 440px) {
    .cc-brand-id, .cc-meta .cc-sig, .cc-meta .cc-time-wrap { display: none; }
    .cc-channel { font-size: clamp(18px, 6vw, 28px); }
  }
  @media (max-height: 200px) {
    .cc-meta-row .cc-carrier { display: none; }
  }
</style>
</head>
<body>

<div class="cc">

  <header class="cc-head">
    <div class="cc-brand">
      <span class="cc-brand-bar"></span>
      <span class="cc-brand-title">COMMAND CENTER // AUDIO</span>
      <span class="cc-brand-id">CCR-01</span>
    </div>
    <div class="cc-meta">
      <span class="cc-sig">SIG <b id="cc-bitrate">--</b></span>
      <span class="cc-time-wrap">TIME <b id="cc-clock">--:--:--</b></span>
      <span class="cc-status">
        <span id="cc-led" class="cc-led"></span>
        <span id="cc-status-text">STANDBY</span>
      </span>
    </div>
  </header>

  <section class="cc-screen">
    <span class="cc-screen-label">CHANNEL</span>
    <div>
      <div id="cc-channel" class="cc-channel">--- NO SIGNAL ---</div>
      <div class="cc-meta-row">
        <span id="cc-sub" class="cc-sub">awaiting selection</span>
        <span id="cc-carrier" class="cc-carrier"></span>
      </div>
    </div>
  </section>

  <footer class="cc-controls">
    <div class="cc-dd" id="cc-dd">
      <button type="button" class="cc-dd-trigger" id="cc-dd-trigger" aria-haspopup="listbox" aria-expanded="false">
        <span class="cc-dd-label">STATION</span>
        <span class="cc-dd-value" id="cc-dd-value">SELECT TRANSMISSION</span>
        <span class="cc-dd-chev">&#9662;</span>
      </button>
      <div class="cc-dd-menu" id="cc-dd-menu" hidden role="listbox" aria-labelledby="cc-dd-trigger">
        <div class="cc-dd-menu-head">
          <span>SELECT TRANSMISSION</span>
          <button type="button" id="cc-dd-close" class="cc-dd-close" aria-label="Close">&times;</button>
        </div>
        <ul class="cc-dd-list" id="cc-dd-list"></ul>
      </div>
    </div>

    <button type="button" id="cc-play" class="cc-btn cc-play" aria-label="Play / pause">
      <span id="cc-play-icon">&#9658;</span>
    </button>
    <button type="button" id="cc-stop" class="cc-btn cc-stop" aria-label="Stop">&#9632;</button>

    <div class="cc-vol">
      <span class="cc-vol-label">VOL</span>
      <input type="range" id="cc-volume" min="0" max="1" step="0.01" value="0.8">
      <span id="cc-vol-read" class="cc-vol-readout">80</span>
    </div>
  </footer>

</div>

<audio id="cc-audio" preload="none"></audio>

<script>
(function(){
  const STATIONS = [
    { name: "GROOVE SALAD",       sub: "DOWNTEMPO / AMBIENT",       url: "https://ice2.somafm.com/groovesalad-128-mp3",   br: "128K" },
    { name: "DRONE ZONE",         sub: "ATMOSPHERIC / SPACE",       url: "https://ice2.somafm.com/dronezone-128-mp3",     br: "128K" },
    { name: "HEAVYWEIGHT REGGAE", sub: "ROOTS / DUB",               url: "https://ice2.somafm.com/reggae-128-mp3",        br: "128K" },
    { name: "DEEP SPACE ONE",     sub: "DEEP AMBIENT / ELECTRONIC", url: "https://ice2.somafm.com/deepspaceone-128-mp3",  br: "128K" },
    { name: "SECRET AGENT",       sub: "SPY JAZZ / LOUNGE",         url: "https://ice2.somafm.com/secretagent-128-mp3",   br: "128K" },
    { name: "DEF CON RADIO",      sub: "HACKER ELECTRONICA",        url: "https://ice2.somafm.com/defcon-128-mp3",        br: "128K" },
    { name: "MISSION CONTROL",    sub: "AMBIENT + NASA COMMS",      url: "https://ice2.somafm.com/missioncontrol-128-mp3", br: "128K" },
    { name: "SPACE STATION",      sub: "AMBIENT ELECTRONICA",       url: "https://ice2.somafm.com/spacestation-128-mp3",  br: "128K" },
    { name: "BAGEL RADIO",        sub: "ECLECTIC ALT ROCK",         url: "https://ice2.somafm.com/bagel-128-mp3",         br: "128K" },
    { name: "INDIE POP ROCKS",    sub: "INDIE POP",                 url: "https://ice2.somafm.com/indiepop-128-mp3",      br: "128K" },
  ];

  const $ = id => document.getElementById(id);
  const audio    = $("cc-audio");
  const channel  = $("cc-channel");
  const sub      = $("cc-sub");
  const carrier  = $("cc-carrier");
  const led      = $("cc-led");
  const statusT  = $("cc-status-text");
  const playBtn  = $("cc-play");
  const playIcn  = $("cc-play-icon");
  const stopBtn  = $("cc-stop");
  const volIn    = $("cc-volume");
  const volRd    = $("cc-vol-read");
  const bitrate  = $("cc-bitrate");
  const clock    = $("cc-clock");
  const dd       = $("cc-dd");
  const ddTrig   = $("cc-dd-trigger");
  const ddMenu   = $("cc-dd-menu");
  const ddList   = $("cc-dd-list");
  const ddVal    = $("cc-dd-value");
  const ddClose  = $("cc-dd-close");

  // Populate custom dropdown items
  STATIONS.forEach((s, i) => {
    const li = document.createElement("li");
    li.className = "cc-dd-item";
    li.setAttribute("role", "option");
    li.dataset.idx = String(i);
    li.innerHTML =
      '<span class="cc-dd-num">CH ' + String(i+1).padStart(2,"0") + '</span>' +
      '<span><span class="cc-dd-name">' + s.name + '</span>' +
      '<div class="cc-dd-sub">' + s.sub + ' &middot; ' + s.br + '</div></span>';
    li.addEventListener("click", () => { selectStation(i); closeDropdown(); });
    ddList.appendChild(li);
  });

  const state = { current: null, currentIdx: -1 };

  function openDropdown() {
    ddMenu.hidden = false;
    dd.classList.add("open");
    ddTrig.setAttribute("aria-expanded", "true");
  }
  function closeDropdown() {
    ddMenu.hidden = true;
    dd.classList.remove("open");
    ddTrig.setAttribute("aria-expanded", "false");
  }
  ddTrig.addEventListener("click", () => { ddMenu.hidden ? openDropdown() : closeDropdown(); });
  ddClose.addEventListener("click", closeDropdown);
  document.addEventListener("keydown", e => { if (e.key === "Escape" && !ddMenu.hidden) closeDropdown(); });

  function setStatus(text, mode) {
    statusT.textContent = text;
    led.className = "cc-led" + (mode ? " " + mode : "");
  }
  function setPlayIcon(playing) {
    playIcn.innerHTML = playing ? "&#10074;&#10074;" : "&#9658;";
  }

  function selectStation(idx) {
    const s = STATIONS[idx];
    if (!s) return;
    state.current = s; state.currentIdx = idx;
    channel.textContent = s.name;
    sub.textContent     = s.sub;
    carrier.textContent = "· " + s.url.replace(/^https?:\/\//, "");
    bitrate.textContent = s.br || "--";
    ddVal.textContent   = s.name;
    Array.from(ddList.children).forEach((li, i) => li.classList.toggle("selected", i === idx));
    audio.src = s.url;
    audio.load();
    setStatus("ACQUIRING...", "");
    audio.play().catch(() => setStatus("FAULT", "error"));
  }

  playBtn.addEventListener("click", () => {
    if (!state.current) {
      selectStation(0);
      return;
    }
    if (audio.paused) audio.play().catch(() => setStatus("FAULT", "error"));
    else audio.pause();
  });

  stopBtn.addEventListener("click", () => {
    audio.pause();
    audio.removeAttribute("src");
    audio.load();
    state.current = null; state.currentIdx = -1;
    channel.textContent = "--- NO SIGNAL ---";
    sub.textContent = "awaiting selection";
    carrier.textContent = "";
    bitrate.textContent = "--";
    ddVal.textContent = "SELECT TRANSMISSION";
    Array.from(ddList.children).forEach(li => li.classList.remove("selected"));
    setStatus("STANDBY", "");
    setPlayIcon(false);
  });

  function applyVol(v) { audio.volume = v; volRd.textContent = String(Math.round(v*100)); }
  volIn.addEventListener("input", e => applyVol(parseFloat(e.target.value)));
  applyVol(parseFloat(volIn.value));

  audio.addEventListener("playing", () => { setPlayIcon(true);  setStatus("TRANSMITTING", "live"); });
  audio.addEventListener("pause",   () => { setPlayIcon(false); if (state.current) setStatus("PAUSED", ""); });
  audio.addEventListener("waiting", () => setStatus("BUFFERING...", ""));
  audio.addEventListener("stalled", () => setStatus("STALLED", "error"));
  audio.addEventListener("error",   () => { setStatus("SIGNAL LOST", "error"); setPlayIcon(false); });

  function tick() {
    const d = new Date();
    const hh = String(d.getHours()).padStart(2,"0");
    const mm = String(d.getMinutes()).padStart(2,"0");
    const ss = String(d.getSeconds()).padStart(2,"0");
    clock.textContent = hh + ":" + mm + ":" + ss;
  }
  tick(); setInterval(tick, 1000);
})();
</script>
</body>
</html>
