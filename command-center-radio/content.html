<!--
  Command Center Radio - Content
  Paste this into the Business Text (volkovlabs-dynamictext-panel) "Content" field.
  Rendering mode: HTML.
  Do NOT use inline onclick/href handlers - all wiring happens in after-content-ready.js
  so Grafana's CSP doesn't drop them and so anchor tags can't pop new windows.
-->
<div id="cc-radio" class="cc-radio">

  <header class="cc-header">
    <div class="cc-brand">
      <span class="cc-brand-bar"></span>
      <span class="cc-brand-title">COMMAND CENTER // AUDIO SUBSYSTEM</span>
      <span class="cc-brand-id">CCR-01</span>
    </div>
    <div class="cc-status">
      <span id="cc-status-light" class="cc-status-light cc-status-standby"></span>
      <span id="cc-status-text" class="cc-status-text">STANDBY</span>
    </div>
  </header>

  <section class="cc-display">
    <div class="cc-display-row">
      <span class="cc-label">CHANNEL</span>
      <span id="cc-now-playing" class="cc-value">--- NO SIGNAL ---</span>
    </div>
    <div class="cc-display-row">
      <span class="cc-label">SRC</span>
      <span id="cc-now-url" class="cc-value cc-value-dim">awaiting selection</span>
    </div>
    <canvas id="cc-visualizer" class="cc-visualizer" width="800" height="64"></canvas>
  </section>

  <section class="cc-stations" id="cc-stations">
    <button type="button" class="cc-station" data-station-name="GROOVE SALAD"     data-station-tag="DOWNTEMPO"   data-station-url="https://ice2.somafm.com/groovesalad-128-mp3">
      <span class="cc-station-tag">CH 01</span>
      <span class="cc-station-name">GROOVE SALAD</span>
      <span class="cc-station-sub">DOWNTEMPO / AMBIENT</span>
    </button>
    <button type="button" class="cc-station" data-station-name="DRONE ZONE"       data-station-tag="AMBIENT"     data-station-url="https://ice2.somafm.com/dronezone-128-mp3">
      <span class="cc-station-tag">CH 02</span>
      <span class="cc-station-name">DRONE ZONE</span>
      <span class="cc-station-sub">ATMOSPHERIC / SPACE</span>
    </button>
    <button type="button" class="cc-station" data-station-name="REGGAE"           data-station-tag="REGGAE"      data-station-url="https://ice2.somafm.com/reggae-128-mp3">
      <span class="cc-station-tag">CH 03</span>
      <span class="cc-station-name">HEAVYWEIGHT REGGAE</span>
      <span class="cc-station-sub">ROOTS / DUB</span>
    </button>
    <button type="button" class="cc-station" data-station-name="DEEP SPACE ONE"   data-station-tag="DEEP SPACE"  data-station-url="https://ice2.somafm.com/deepspaceone-128-mp3">
      <span class="cc-station-tag">CH 04</span>
      <span class="cc-station-name">DEEP SPACE ONE</span>
      <span class="cc-station-sub">DEEP AMBIENT / ELECTRONIC</span>
    </button>
  </section>

  <footer class="cc-controls">
    <button type="button" id="cc-play-pause" class="cc-btn cc-btn-primary">
      <span class="cc-btn-icon">&#9658;</span>
      <span class="cc-btn-label">PLAY</span>
    </button>
    <button type="button" id="cc-stop" class="cc-btn">
      <span class="cc-btn-icon">&#9632;</span>
      <span class="cc-btn-label">STOP</span>
    </button>
    <div class="cc-volume">
      <span class="cc-label">VOL</span>
      <input type="range" id="cc-volume" min="0" max="1" step="0.01" value="0.8" />
      <span id="cc-volume-readout" class="cc-value-dim">80</span>
    </div>
    <button type="button" id="cc-viz-toggle" class="cc-btn cc-btn-ghost" title="Toggle audio visualizer">
      <span class="cc-btn-label">VIZ</span>
      <span id="cc-viz-state" class="cc-value-dim">OFF</span>
    </button>
  </footer>

  <!-- Single persistent audio element. Never duplicated, only audio.src is swapped. -->
  <audio id="cc-audio" preload="none"></audio>
</div>
