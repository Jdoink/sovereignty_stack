<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Enter The Vault</title>
<style>
  @font-face { font-family:"Cinzel"; font-display:swap; font-weight:400 700;
    src:url("/fonts/cinzel.woff2") format("woff2"), url("/fonts/cinzel.ttf") format("truetype"); }
  :root {
    --marble-1: #f5f0e6; --marble-2: #e9decb; --marble-3: #dcceb2;
    --gold: #b8902f; --gold-bright: #e3c987; --gold-deep: #6f5226;
    --emerald: #1f6b4f; --emerald-deep: #0f3d2e; --ink: #243029; --ink-soft: #5e5848;
    --display:"Cinzel",Optima,"Palatino Linotype",Palatino,Georgia,serif;
    --meander:url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='16'%20height='16'%3E%3Cpath%20d='M0,1H15V15H4V4H11V11H7'%20fill='none'%20stroke='%23b8902f'%20stroke-width='1.3'/%3E%3C/svg%3E");
    --rosette:url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='20'%20height='20'%3E%3Cg%20fill='%23e3c987'%20stroke='%236f5226'%20stroke-width='0.7'%3E%3Ccircle%20cx='10'%20cy='5'%20r='3.3'/%3E%3Ccircle%20cx='10'%20cy='15'%20r='3.3'/%3E%3Ccircle%20cx='5'%20cy='10'%20r='3.3'/%3E%3Ccircle%20cx='15'%20cy='10'%20r='3.3'/%3E%3Ccircle%20cx='10'%20cy='10'%20r='2.2'%20fill='%236f5226'/%3E%3C/g%3E%3C/svg%3E");
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { margin:0; padding:0; height:100%; width:100%; overflow:hidden; }
  body { background:
      radial-gradient(ellipse 60% 55% at 50% 40%, rgba(255,255,255,0.6), transparent 64%),
      radial-gradient(ellipse 60% 50% at 50% 100%, rgba(31,107,79,0.12), transparent 60%),
      linear-gradient(162deg,#f5f0e6,#e9decb 58%,#dcceb2);
    color:var(--ink); font-family:var(--display);
    display:flex; align-items:center; justify-content:center; cursor:pointer; user-select:none; }
  body::before { content:""; position:fixed; inset:0; pointer-events:none;
    background-image: repeating-linear-gradient(57deg, rgba(120,116,104,0.045) 0 1px, transparent 1px 27px),
      repeating-linear-gradient(-34deg, rgba(120,116,104,0.035) 0 1px, transparent 1px 41px); }
  body::after { content:""; position:fixed; inset:0; pointer-events:none; box-shadow:inset 0 0 180px rgba(120,96,40,0.14); }

  .scene { position:relative; height:88vh; aspect-ratio:0.66; max-width:92vw; display:flex; flex-direction:column; align-items:center;
    transition:transform 0.6s cubic-bezier(.2,.7,.2,1); }
  body:hover .scene { transform:scale(1.015); }

  .lintel { text-align:center; margin-bottom:14px; }
  .lintel .kick { font-size:clamp(9px,1.4vh,12px); letter-spacing:0.5em; color:var(--gold-deep); text-transform:uppercase; opacity:0.9; }
  .lintel .name { font-size:clamp(28px,6vh,60px); font-weight:700; letter-spacing:0.18em; text-transform:uppercase;
    color:var(--emerald-deep); text-shadow:0 1px 0 rgba(255,255,255,0.6),0 2px 6px rgba(120,96,40,0.2); margin-top:4px; }
  .laurels { display:flex; align-items:center; justify-content:center; gap:14px; margin-top:6px; }
  .laurels svg { width:64px; height:30px; color:var(--emerald); opacity:0.9; }
  .laurels svg.flip { transform:scaleX(-1); }
  .lintel .estd { font-size:clamp(8px,1.2vh,11px); letter-spacing:0.42em; text-transform:uppercase; color:var(--gold-deep); opacity:0.85; margin-top:10px; }

  .doorway { position:relative; flex:1; width:100%; border-radius:50% 50% 6px 6px / 26% 26% 6px 6px;
    padding:12px;
    background:
      var(--rosette) bottom 6px left 6px / 18px 18px no-repeat,
      var(--rosette) bottom 6px right 6px / 18px 18px no-repeat,
      linear-gradient(135deg,#f1dba4,#b18f50 28%,#ecd197 50%,#7c5f30 74%,#d9be7f);
    box-shadow:0 28px 56px rgba(80,60,20,0.32),0 0 0 1px rgba(110,82,38,0.7), 0 0 60px rgba(184,144,47,0.18);
    overflow:hidden; }
  .interior { position:absolute; inset:12px; border-radius:50% 50% 4px 4px / 25% 25% 4px 4px; overflow:hidden;
    background:radial-gradient(ellipse 80% 72% at 50% 60%, #fff6da, #e3c987 38%, #b8902f 72%);
    box-shadow:inset 0 0 60px rgba(120,90,30,0.4); }
  .light { position:absolute; inset:0; opacity:0; transition:opacity 0.6s ease;
    background:radial-gradient(ellipse 60% 60% at 50% 55%, #ffffff, #fff2c8 38%, transparent 72%); }

  .door { position:absolute; top:0; bottom:0; width:50%; z-index:2; transition:transform 0.7s cubic-bezier(.5,0,.2,1);
    background:linear-gradient(100deg,#2a8062,#1f6b4f 55%,#0f3d2e);
    box-shadow:inset 0 0 44px rgba(8,40,28,0.6); }
  .door.left { left:0; border-right:1px solid rgba(236,212,154,0.6); }
  .door.right { right:0; border-left:1px solid rgba(236,212,154,0.6); }
  .door::before { content:""; position:absolute; inset:14px; border:1px solid rgba(236,212,154,0.45); border-radius:3px;
    box-shadow:inset 0 0 0 6px rgba(8,40,28,0.25), inset 0 0 26px rgba(8,40,28,0.5); }
  .door::after { content:""; position:absolute; top:50%; width:22px; height:22px; border-radius:50%;
    border:2px solid var(--gold-bright); box-shadow:0 0 10px rgba(236,212,154,0.5); transform:translateY(-50%); }
  .door.left::after { right:10px; } .door.right::after { left:10px; }

  .enter { position:absolute; left:0; right:0; bottom:7%; z-index:3; text-align:center;
    font-size:clamp(11px,1.8vh,15px); letter-spacing:0.34em; text-transform:uppercase; color:var(--gold-bright);
    text-shadow:0 1px 6px rgba(8,40,28,0.6); animation:breathe 2.6s ease-in-out infinite; }
  @keyframes breathe { 0%,100%{opacity:0.6;} 50%{opacity:1;} }

  .seam { position:absolute; top:8%; bottom:8%; left:50%; width:2px; z-index:3; transform:translateX(-50%);
    background:linear-gradient(180deg,transparent,rgba(236,212,154,0.8),transparent); opacity:0.55; transition:opacity 0.3s; }
  body:hover .seam { opacity:0.95; }

  .frame-key { position:fixed; left:0; right:0; bottom:0; height:14px; background-image:var(--meander);
    background-repeat:repeat-x; background-position:center; opacity:0.6; }

  .opening .door.left { transform:translateX(-104%); }
  .opening .door.right { transform:translateX(104%); }
  .opening .light { opacity:1; }
  .opening .enter, .opening .seam { opacity:0; }
  .bloom { position:fixed; left:50%; top:55%; width:10px; height:10px; border-radius:50%; transform:translate(-50%,-50%) scale(0);
    background:radial-gradient(circle,#fff,#fff2c8 40%,rgba(227,201,135,0) 72%); z-index:20; pointer-events:none; }
  .opening .bloom { animation:bloom 0.7s ease-in 0.25s forwards; }
  @keyframes bloom { from{transform:translate(-50%,-50%) scale(0);opacity:0.9;} to{transform:translate(-50%,-50%) scale(60);opacity:1;} }
</style>
</head>
<body id="body" role="button" tabindex="0" aria-label="Enter The Vault">
  <div class="scene">
    <div class="lintel">
      <div class="kick">Sovereignty Stack</div>
      <div class="name">The&nbsp;Vault</div>
      <div class="laurels">
        <svg viewBox="0 0 80 36" aria-hidden="true"><path d="M6 30 C 28 30 56 22 76 6" fill="none" stroke="currentColor" stroke-width="1.4"/><g fill="currentColor"><ellipse cx="16" cy="28" rx="6" ry="2.3" transform="rotate(-16 16 28)"/><ellipse cx="28" cy="25" rx="6.5" ry="2.4" transform="rotate(-23 28 25)"/><ellipse cx="40" cy="20" rx="6.8" ry="2.5" transform="rotate(-30 40 20)"/><ellipse cx="52" cy="15" rx="6.4" ry="2.4" transform="rotate(-37 52 15)"/><ellipse cx="63" cy="10" rx="5.8" ry="2.2" transform="rotate(-44 63 10)"/></g></svg>
        <svg class="flip" viewBox="0 0 80 36" aria-hidden="true"><path d="M6 30 C 28 30 56 22 76 6" fill="none" stroke="currentColor" stroke-width="1.4"/><g fill="currentColor"><ellipse cx="16" cy="28" rx="6" ry="2.3" transform="rotate(-16 16 28)"/><ellipse cx="28" cy="25" rx="6.5" ry="2.4" transform="rotate(-23 28 25)"/><ellipse cx="40" cy="20" rx="6.8" ry="2.5" transform="rotate(-30 40 20)"/><ellipse cx="52" cy="15" rx="6.4" ry="2.4" transform="rotate(-37 52 15)"/><ellipse cx="63" cy="10" rx="5.8" ry="2.2" transform="rotate(-44 63 10)"/></g></svg>
      </div>
      <div class="estd">Established MMXXVI &middot; A Private Collection</div>
    </div>

    <div class="doorway">
      <div class="interior">
        <div class="light"></div>
        <div class="door left"></div>
        <div class="door right"></div>
        <div class="seam"></div>
        <div class="enter">Enter</div>
      </div>
    </div>
  </div>
  <div class="frame-key"></div>
  <div class="bloom"></div>

<script>
  var entered = false;
  function enter() {
    if (entered) return; entered = true;
    document.body.classList.add("opening");
    var url = location.origin + "/vault";
    setTimeout(function () {
      try { window.top.location.href = url; }   // take over the whole screen (grand entrance)
      catch (e) { window.open(url, "_blank", "noopener"); }
    }, 720);
  }
  document.body.addEventListener("click", enter);
  document.body.addEventListener("keydown", function (e) { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); enter(); } });
</script>
</body>
</html>
