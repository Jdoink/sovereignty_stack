<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" font-family="Georgia, 'Times New Roman', serif">
  <rect x="2" y="2" width="716" height="276" rx="10" fill="#fbf7ee" stroke="#2f7e8c" stroke-width="1.5"/>
  <text x="360" y="34" text-anchor="middle" font-size="19" font-weight="bold" fill="#0f3d2e">From On/Off to Logic: The Gates</text>
  <text x="360" y="56" text-anchor="middle" font-size="13" font-style="italic" fill="#5e5848">Every computation is millions of these three switches, combined.</text>

  <g stroke="#1f6b4f" stroke-width="2" fill="none" stroke-linejoin="round">
    <!-- AND -->
    <g transform="translate(70,110)">
      <path d="M30,0 L30,60 L60,60 A30,30 0 0 0 60,0 Z" fill="#2f7e8c" fill-opacity="0.12"/>
      <path d="M5,15 H30 M5,45 H30 M90,30 H115"/>
    </g>
    <!-- OR -->
    <g transform="translate(310,110)">
      <path d="M28,0 Q45,30 28,60 Q70,58 95,30 Q70,2 28,0 Z" fill="#2f7e8c" fill-opacity="0.12"/>
      <path d="M5,15 H34 M5,45 H34 M95,30 H120"/>
    </g>
    <!-- NOT -->
    <g transform="translate(550,110)">
      <path d="M30,0 L30,60 L85,30 Z" fill="#2f7e8c" fill-opacity="0.12"/>
      <circle cx="91" cy="30" r="6" fill="#fbf7ee"/>
      <path d="M5,30 H30 M97,30 H120"/>
    </g>
  </g>

  <g font-family="Georgia, serif" text-anchor="middle">
    <text x="160" y="100" font-size="15" font-weight="bold" fill="#0f3d2e">AND</text>
    <text x="160" y="205" font-size="12.5" fill="#5e5848">1 only if both inputs are 1</text>
    <text x="405" y="100" font-size="15" font-weight="bold" fill="#0f3d2e">OR</text>
    <text x="405" y="205" font-size="12.5" fill="#5e5848">1 if either input is 1</text>
    <text x="635" y="100" font-size="15" font-weight="bold" fill="#0f3d2e">NOT</text>
    <text x="635" y="205" font-size="12.5" fill="#5e5848">flips 1 to 0, and 0 to 1</text>
  </g>
  <rect x="60" y="228" width="600" height="38" rx="8" fill="#2f7e8c" opacity="0.10"/>
  <text x="360" y="252" text-anchor="middle" font-size="12.5" fill="#0f3d2e" font-style="italic">Stack enough gates and you get arithmetic, memory, and eventually everything a computer does.</text>
</svg>
